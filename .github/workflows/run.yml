name: Daily Tirana Bar Report

on:
  schedule:
    # 每天早上 08:00 自动运行 (UTC 时间)
    - cron: '0 8 * * *'
  # 允许你在 Actions 页面手动点击按钮运行
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 关键步骤：必须安装翻译库，否则代码会跳过翻译逻辑
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install deep-translator

      - name: Run script
        env:
          SERP_KEY: ${{ secrets.SERP_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
